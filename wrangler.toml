name = "clickmatch"
main = "server/src/index.ts"
compatibility_date = "2026-07-10"
compatibility_flags = ["nodejs_compat"]

# ── Durable Objects ────────────────────────────────────

[[durable_objects.bindings]]
name = "CANVAS_ROOM"
class_name = "CanvasRoom"

[[migrations]]
tag = "v1"
new_classes = ["CanvasRoom"]

# ── D1 Database ────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "clickmatch-db"
database_id = ""

# ── R2 Buckets ─────────────────────────────────────────

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "clickmatch-assets"

# ── Environment Variables ──────────────────────────────

[vars]
CANVAS_WIDTH = "2560"
CANVAS_HEIGHT = "1600"

# PayPal — set via `wrangler secret put`:
#   PAYPAL_CLIENT_ID   — your PayPal app client ID
#   PAYPAL_CLIENT_SECRET — your PayPal app secret
#   PAYPAL_API_URL     — https://api-m.sandbox.paypal.com (test) or https://api-m.paypal.com (live)
#   JWT_SECRET         — random 64+ char string for JWT signing

# ── Observability ──────────────────────────────────────

[observability]
enabled = true
head_sampling_rate = 1

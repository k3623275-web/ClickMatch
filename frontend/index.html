<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickMatch — Global Pixel Canvas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'%3E%3Crect x='1' y='1' width='3' height='3' fill='%2300FF88'/%3E%3Crect x='5' y='1' width='3' height='3' fill='%23FF4444'/%3E%3Crect x='9' y='1' width='3' height='3' fill='%234488FF'/%3E%3Crect x='12' y='1' width='3' height='3' fill='%23FFCC00'/%3E%3Crect x='1' y='5' width='3' height='3' fill='%238844CC'/%3E%3Crect x='5' y='5' width='3' height='3' fill='%2300FF88'/%3E%3Crect x='9' y='5' width='3' height='3' fill='%23FF4444'/%3E%3Crect x='12' y='5' width='3' height='3' fill='%234488FF'/%3E%3Crect x='1' y='9' width='3' height='3' fill='%23FFCC00'/%3E%3Crect x='5' y='9' width='3' height='3' fill='%238844CC'/%3E%3Crect x='9' y='9' width='3' height='3' fill='%2300FF88'/%3E%3Crect x='12' y='9' width='3' height='3' fill='%23FF4444'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     TOP BAR
     ══════════════════════════════════════════════════════ -->
<div id="topBar">
  <div class="topbar-left">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
      <rect x="2" y="2" width="6" height="6" fill="#00FF88"/>
      <rect x="9" y="2" width="6" height="6" fill="#FF4444"/>
      <rect x="16" y="2" width="6" height="6" fill="#4488FF"/>
      <rect x="23" y="2" width="6" height="6" fill="#FFCC00"/>
      <rect x="2" y="9" width="6" height="6" fill="#8844CC"/>
      <rect x="9" y="9" width="6" height="6" fill="#00FF88"/>
      <rect x="16" y="9" width="6" height="6" fill="#FF4444"/>
      <rect x="23" y="9" width="6" height="6" fill="#4488FF"/>
      <rect x="2" y="16" width="6" height="6" fill="#FFCC00"/>
      <rect x="9" y="16" width="6" height="6" fill="#8844CC"/>
      <rect x="16" y="16" width="6" height="6" fill="#00FF88"/>
      <rect x="23" y="16" width="6" height="6" fill="#FF4444"/>
      <rect x="2" y="23" width="6" height="6" fill="#4488FF"/>
      <rect x="9" y="23" width="6" height="6" fill="#FFCC00"/>
      <rect x="16" y="23" width="6" height="6" fill="#8844CC"/>
      <rect x="23" y="23" width="6" height="6" fill="#00FF88"/>
    </svg>
    CLICKMATCH
  </div>

  <div class="topbar-center">
    <div class="countdown-label">剩余时间</div>
    <div id="countdown">--:--:--</div>
    <div class="countdown-label">Phase 1</div>
  </div>

  <div class="topbar-right">
    <span id="connStatus" class="conn-status disconnected">● 未连接</span>
    <span id="globalClicks">0</span>
    <span style="font-size:10px;color:var(--text-disabled)">clicks</span>
    <button class="btn-ghost" id="loginBtn">登录</button>
    <button class="btn-primary" id="registerBtn">注册</button>
    <div id="userInfo">
      <span id="userName">--</span>
      <span id="userBalance">500</span>
      <span style="font-size:10px;color:var(--text-disabled)">剩余</span>
    </div>
    <button id="lbToggle" title="排行榜">🏆</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     CANVAS
     ══════════════════════════════════════════════════════ -->
<div class="canvas-wrap">
  <canvas id="pixelCanvas"></canvas>
</div>

<!-- ══════════════════════════════════════════════════════
     FROZEN OVERLAY
     ══════════════════════════════════════════════════════ -->
<div class="frozen-overlay" id="frozenOverlay">
  <div class="frozen-content">
    <h2>比赛结束</h2>
    <p>画布已冻结，感谢你的参与！</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     BOTTOM BAR
     ══════════════════════════════════════════════════════ -->
<div id="bottomBar">
  <div class="color-picker" id="colorPicker">
    <span class="cp-label">颜色</span>
    <button class="cp-swatch" data-color="#FF4444" style="background:#FF4444" title="Red"></button>
    <button class="cp-swatch" data-color="#FF8800" style="background:#FF8800" title="Orange"></button>
    <button class="cp-swatch" data-color="#FFCC00" style="background:#FFCC00" title="Yellow"></button>
    <button class="cp-swatch" data-color="#44CC44" style="background:#44CC44" title="Green"></button>
    <button class="cp-swatch" data-color="#00CCCC" style="background:#00CCCC" title="Cyan"></button>
    <button class="cp-swatch" data-color="#4488FF" style="background:#4488FF" title="Blue"></button>
    <button class="cp-swatch" data-color="#8844CC" style="background:#8844CC" title="Purple"></button>
    <button class="cp-swatch" data-color="#FF66AA" style="background:#FF66AA" title="Pink"></button>
    <button class="cp-swatch" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></button>
    <button class="cp-swatch" data-color="#CCCCCC" style="background:#CCCCCC" title="Light Gray"></button>
    <button class="cp-swatch" data-color="#888888" style="background:#888888" title="Gray"></button>
    <button class="cp-swatch" data-color="#444444" style="background:#444444" title="Dark Gray"></button>
    <button class="cp-swatch" data-color="#000000" style="background:#000000" title="Black"></button>
    <button class="cp-swatch" data-color="#886644" style="background:#886644" title="Brown"></button>
    <button class="cp-swatch" data-color="#DAA520" style="background:#DAA520" title="Gold"></button>
    <button class="cp-swatch" data-color="#88CCFF" style="background:#88CCFF" title="Sky Blue"></button>
  </div>
  <div class="bottom-info">
    <span id="coordDisplay"></span>
    <span id="zoomDisplay">100%</span>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     PHASE PREVIEW CARDS (below canvas, scrollable)
     ══════════════════════════════════════════════════════ -->
<div class="phase-cards" id="phaseCards"></div>

<!-- ══════════════════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════
     AUTH MODAL
     ══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="authTitle">登录</div>
      <button class="modal-close" id="authClose">✕</button>
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="至少8个字符" autocomplete="current-password">
    </div>
    <div class="form-error" id="authError"></div>
    <button id="authSubmit">登录</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     LEADERBOARD PANEL
     ══════════════════════════════════════════════════════ -->
<div id="lbPanel">
  <div class="lb-header">
    <div class="lb-title">🏆 排行榜</div>
    <button id="lbClose">✕</button>
  </div>
  <div id="lbList">
    <div class="lb-loading">打开即加载...</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     SCRIPTS
     ══════════════════════════════════════════════════════ -->
<script src="js/canvas.js"></script>
<script src="js/websocket.js"></script>
<script src="js/ui.js"></script>
<script>
// ── Bootstrap ───────────────────────────────────────
(function () {
  CM.initUI();

  // Initialize canvas after DOM is laid out
  setTimeout(() => {
    CM.initCanvas();
  }, 100);

  // For demo: start a 24h countdown
  // In production, this comes from WS countdown message
  setTimeout(() => {
    CM.updateCountdown(86400); // 24 hours for demo
    CM.updateGlobalClicks(0);
  }, 500);

  // Handle frozen overlay
  const origFreeze = CM.freeze;
  CM.freeze = function () {
    origFreeze.call(CM);
    document.getElementById('frozenOverlay').classList.add('show');
  };
})();
</script>

</body>
</html>

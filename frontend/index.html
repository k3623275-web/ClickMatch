<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickMatch</title>
<!-- PayPal JS SDK — replace CLIENT_ID when going live -->
<script src="https://www.paypal.com/sdk/js?client-id=CLIENT_ID&currency=USD" data-sdk-integration-source="button-factory"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#fff;color:#222;min-height:100vh;overflow-x:hidden}

/* ═══════════ LANDING ═══════════ */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;position:relative}
#landing .title{position:absolute;top:40px;left:48px;font-size:30px;font-weight:700;letter-spacing:2px;color:#111;cursor:default;user-select:none}
#phases{display:flex;gap:64px;align-items:center;justify-content:center;flex-wrap:wrap}
.phase-wrapper{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative}
.phase-circle{width:130px;height:130px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:300;color:#bbb;cursor:default;transition:all .25s;background:#fff;position:relative}
.phase-circle.active{border-color:#333;color:#111;cursor:pointer}
.phase-circle.active:hover{background:#f7f7f7;transform:scale(1.06)}
.phase-circle.locked{background:#fafafa;border-style:dashed;border-color:#e0e0e0}
.phase-circle.locked .lock-icon{font-size:18px;color:#ccc}
.phase-label{font-size:14px;color:#999;text-align:center;letter-spacing:1px}

/* footer */
#landing footer{position:absolute;bottom:48px;text-align:center;font-size:13px;color:#aaa;line-height:2}
#dev-hint{color:#ddd;font-size:10px;margin-top:6px;cursor:pointer}
#dev-hint:hover{color:#aaa}

/* language switch */
.lang-switch{position:absolute;bottom:48px;right:48px;display:flex;gap:6px}
.lang-switch button{background:transparent;border:1px solid #e0e0e0;padding:5px 9px;border-radius:4px;cursor:pointer;color:#999;font-size:11px;transition:all .15s}
.lang-switch button:hover{background:#f5f5f5;color:#333}
.lang-switch button.active{background:#222;color:#fff;border-color:#222}

/* ═══════════ CANVAS PAGE ═══════════ */
#canvas-page{display:none;width:100vw;height:100vh;position:relative;background:#fff;overflow:hidden}
#back-btn{position:absolute;top:20px;left:24px;z-index:100;background:transparent;border:1px solid #ddd;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px;color:#666;transition:all .15s}
#back-btn:hover{background:#f5f5f5;color:#111}

/* canvas with breathing room */
#canvas-wrap{position:absolute;overflow:hidden;border:1px solid #eee}
#pixel-canvas{display:block;image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;cursor:crosshair}

/* status bar */
#status-bar{position:absolute;top:20px;right:24px;z-index:100;display:flex;align-items:center;gap:10px;font-size:13px;color:#999}
#ws-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
#ws-dot.online{background:#4a4}
#online-count{color:#aaa;font-size:12px}

/* left & right toggle buttons */
#left-toggle,#right-toggle{position:absolute;top:50%;transform:translateY(-50%);z-index:100;background:#fff;border:1px solid #e0e0e0;width:30px;height:64px;cursor:pointer;font-size:16px;color:#999;display:flex;align-items:center;justify-content:center;transition:all .15s}
#left-toggle{left:0;border-left:none;border-radius:0 5px 5px 0}
#right-toggle{right:0;border-right:none;border-radius:5px 0 0 5px}
#left-toggle:hover,#right-toggle:hover{background:#f5f5f5;color:#333}

/* left panel */
#left-panel{position:absolute;left:0;top:0;width:280px;height:100vh;background:#fafafa;border-right:1px solid #eee;z-index:99;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;padding:80px 16px 24px;overflow-y:auto}
#left-panel.open{transform:translateX(0)}
#left-panel h3{font-size:13px;font-weight:500;color:#999;margin-bottom:14px;text-transform:uppercase;letter-spacing:2px}
#color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:28px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:3px;border:1px solid #ddd;cursor:pointer;transition:transform .12s}
.color-swatch:hover{transform:scale(1.25);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.color-swatch.selected{border:2px solid #333;box-shadow:0 0 0 1px #fff,0 0 0 3px #333}
#paypal-btn-container{margin-bottom:6px}
#clicks-remain{text-align:center;font-size:12px;color:#bbb;margin-top:10px}
#clicks-remain .count{font-weight:700;color:#333}
.buy-status{text-align:center;font-size:12px;color:#4a4;margin-top:4px}

/* right panel: chat */
#right-panel{position:absolute;right:0;top:0;width:280px;height:100vh;background:#fafafa;border-left:1px solid #eee;z-index:99;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;padding:80px 16px 20px}
#right-panel.open{transform:translateX(0)}
#right-panel h3{font-size:13px;font-weight:500;color:#999;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px}
#chat-msgs{flex:1;overflow-y:auto;font-size:13px;line-height:1.7;margin-bottom:12px}
.chat-msg{padding:6px 0;border-bottom:1px solid #f5f5f5;word-break:break-word}
.chat-msg .time{font-size:10px;color:#ccc;margin-right:8px}
.chat-area{display:flex;gap:6px}
#chat-input{flex:1;padding:9px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
#chat-input:focus{border-color:#aaa}
#chat-send{padding:9px 16px;background:#111;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;letter-spacing:.5px;transition:background .15s}
#chat-send:hover{background:#333}

@media(max-width:768px){
  #landing .title{position:static;text-align:center;margin-bottom:48px;font-size:24px}
  #phases{gap:28px}
  .phase-circle{width:90px;height:90px;font-size:32px}
  .lang-switch{bottom:24px;right:24px}
}
</style>
</head>
<body>

<!-- ═══════════ CANVAS PAGE ═══════════ -->
<div id="canvas-page">
  <button id="back-btn" data-action="close-canvas">← <span data-i18n="back">返回</span></button>

  <div id="status-bar">
    <div id="ws-dot"></div>

  </div>

  <button id="left-toggle" data-action="toggle-left">☰</button>

  <div id="canvas-wrap">
    <canvas id="pixel-canvas"></canvas>
  </div>

  <div id="left-panel">
    <h3 data-i18n="colors">颜色</h3>
    <div id="color-grid"></div>
    <div id="paypal-btn-container"></div>
    <div class="buy-status" id="buy-status"></div>
    <div id="clicks-remain"><span data-i18n="remaining">剩余</span>: <span id="click-count" class="count">0</span></div>

  <div id="right-panel">
    <h3 data-i18n="live_chat">实时聊天</h3>
    <div id="chat-msgs"></div>
    <div class="chat-area">
      <input id="chat-input" placeholder="说点什么..." data-i18n-placeholder="chat_placeholder">
      <button id="chat-send" data-action="send-chat" data-i18n="send">发送</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ═══════════ CONFIG ═══════════
var API_BASE = "https://clickmatch-api.your-domain.workers.dev";
var WS_URL = API_BASE.replace("https://", "wss://") + "/api/canvas/connect";
var PAYPAL_CLIENT_ID = "CLIENT_ID";

// ═══════════ i18n ═══════════
var I18N = {
  zh:{phase1_live:"第一阶段火热进行中",phase1:"第一阶段",phase2:"第二阶段",phase3:"第三阶段",phase4:"第四阶段",phase1_dates:"第一阶段由2026.7.10开始，截止到2026.7.23",more_phases:"后续阶段尽情期待",back:"返回",colors:"颜色",buy_clicks:"$1 → 100次点击",remaining:"剩余",live_chat:"实时聊天",chat_placeholder:"说点什么...",send:"发送",no_clicks:"没有剩余点击次数",paid:"已购买100次点击！",paying:"支付处理中..."},
  en:{phase1_live:"Phase 1 Now Live",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: July 10 – July 23, 2026",more_phases:"More phases coming soon",back:"Back",colors:"Colors",buy_clicks:"$1 → 100 Clicks",remaining:"Remaining",live_chat:"Live Chat",chat_placeholder:"Say something...",send:"Send",no_clicks:"No clicks remaining",paid:"100 clicks purchased!",paying:"Processing payment..."},
  ja:{phase1_live:"フェーズ1 開催中",phase1:"フェーズ1",phase2:"フェーズ2",phase3:"フェーズ3",phase4:"フェーズ4",phase1_dates:"フェーズ1: 2026.7.10 – 7.23",more_phases:"続くフェーズをお楽しみに",back:"戻る",colors:"色",buy_clicks:"$1 → 100クリック",remaining:"残り",live_chat:"ライブチャット",chat_placeholder:"何か話す...",send:"送信",no_clicks:"クリック残数なし",paid:"100クリック購入！",paying:"決済処理中..."},
  ko:{phase1_live:"1단계 진행 중",phase1:"1단계",phase2:"2단계",phase3:"3단계",phase4:"4단계",phase1_dates:"1단계: 2026.7.10 – 7.23",more_phases:"다음 단계를 기대해주세요",back:"뒤로",colors:"색상",buy_clicks:"$1 → 100클릭",remaining:"남음",live_chat:"실시간 채팅",chat_placeholder:"이야기하기...",send:"전송",no_clicks:"클릭 횟수 없음",paid:"100클릭 구매!",paying:"결제 처리 중..."},
  fr:{phase1_live:"Phase 1 en cours",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: 10 – 23 juillet 2026",more_phases:"Prochaines phases à venir",back:"Retour",colors:"Couleurs",buy_clicks:"$1 → 100 clics",remaining:"Restant",live_chat:"Chat en direct",chat_placeholder:"Dites quelque chose...",send:"Envoyer",no_clicks:"Plus de clics",paid:"100 clics achetés !",paying:"Paiement en cours..."},
  de:{phase1_live:"Phase 1 läuft",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: 10. Juli – 23. Juli 2026",more_phases:"Weitere Phasen folgen",back:"Zurück",colors:"Farben",buy_clicks:"$1 → 100 Klicks",remaining:"Verbleibend",live_chat:"Live-Chat",chat_placeholder:"Sag etwas...",send:"Senden",no_clicks:"Keine Klicks übrig",paid:"100 Klicks gekauft!",paying:"Zahlung wird verarbeitet..."},
  es:{phase1_live:"Fase 1 en curso",phase1:"Fase 1",phase2:"Fase 2",phase3:"Fase 3",phase4:"Fase 4",phase1_dates:"Fase 1: 10 – 23 julio 2026",more_phases:"Próximas fases pronto",back:"Volver",colors:"Colores",buy_clicks:"$1 → 100 clics",remaining:"Restante",live_chat:"Chat en vivo",chat_placeholder:"Di algo...",send:"Enviar",no_clicks:"Sin clics restantes",paid:"¡100 clics comprados!",paying:"Procesando pago..."},
  ar:{phase1_live:"المرحلة الأولى جارية",phase1:"المرحلة ١",phase2:"المرحلة ٢",phase3:"المرحلة ٣",phase4:"المرحلة ٤",phase1_dates:"المرحلة الأولى: ١٠-٢٣ يوليو ٢٠٢٦",more_phases:"المزيد من المراحل قريباً",back:"رجوع",colors:"الألوان",buy_clicks:"$1 → 100 نقرة",remaining:"متبقي",live_chat:"دردشة مباشرة",chat_placeholder:"قل شيئاً...",send:"إرسال",no_clicks:"لا توجد نقرات متبقية",paid:"تم شراء 100 نقرة!",paying:"جاري معالجة الدفع..."},
  ru:{phase1_live:"Фаза 1 идёт",phase1:"Фаза 1",phase2:"Фаза 2",phase3:"Фаза 3",phase4:"Фаза 4",phase1_dates:"Фаза 1: 10–23 июля 2026",more_phases:"Следующие фазы скоро",back:"Назад",colors:"Цвета",buy_clicks:"$1 → 100 кликов",remaining:"Осталось",live_chat:"Чат",chat_placeholder:"Скажите что-нибудь...",send:"Отправить",no_clicks:"Клики закончились",paid:"100 кликов куплено!",paying:"Обработка платежа..."}
};

var lang = "zh";

function t(key) {
  return (I18N[lang] && I18N[lang][key]) || (I18N.zh && I18N.zh[key]) || key;
}

function setLang(l) {
  lang = l;
  var btns = document.querySelectorAll(".lang-switch button");
  for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i].dataset.lang === l);
  var els = document.querySelectorAll("[data-i18n]");
  for (var j = 0; j < els.length; j++) els[j].textContent = t(els[j].dataset.i18n);
  var phs = document.querySelectorAll("[data-i18n-placeholder]");
  for (var k = 0; k < phs.length; k++) phs[k].placeholder = t(phs[k].dataset.i18nPlaceholder);
}

// ═══════════ SESSION + WEBSOCKET ═══════════
var sessionId = localStorage.getItem("cm_session_id");
var clicksRemaining = 0;
var ws = null, wsReady = false, wsQueue = [];

function ensureSession() {
  if (!sessionId) {
    sessionId = "sess_" + crypto.randomUUID();
    localStorage.setItem("cm_session_id", sessionId);
  }
}

function initSession() {
  ensureSession();
  fetch(API_BASE + "/api/session?session_id=" + encodeURIComponent(sessionId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sc = data.clicks || 0;
      var lc = parseInt(localStorage.getItem("cm_clicks") || "0", 10);
      clicksRemaining = Math.max(sc, lc);
      updateClickCount();
      connectWS();
    })
    .catch(function() {
      clicksRemaining = parseInt(localStorage.getItem("cm_clicks") || "0", 10);
      updateClickCount();
      connectWS();
    });
}

function connectWS() {
  if (ws) { try { ws.close(); } catch(e){} }
  var url = WS_URL + "?session_id=" + encodeURIComponent(sessionId);
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.onopen = function() {
    wsReady = true;
    setWsStatus(true);
    for (var i = 0; i < wsQueue.length; i++) ws.send(JSON.stringify(wsQueue[i]));
    wsQueue = [];
  };

  ws.onmessage = function(evt) {
    if (evt.data instanceof ArrayBuffer) {
      // Full canvas PNG from server
      var blob = new Blob([evt.data], {type: "image/png"});
      var u = URL.createObjectURL(blob);
      var img = new Image();
      img.onload = function() {
        var c = document.getElementById("pixel-canvas");
        var ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0);
        paintImageData = ctx.getImageData(0, 0, W, H);
        compositeCanvas();
        URL.revokeObjectURL(u);
      };
      img.src = u;
      return;
    }

    var msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.type === "init") {
      setOnlineCount(msg.connected || 0);
    } else if (msg.type === "pixel") {
      var idx = msg.y * W + msg.x;
      var r = parseInt(msg.color.slice(1,3), 16);
      var g = parseInt(msg.color.slice(3,5), 16);
      var b = parseInt(msg.color.slice(5,7), 16);
      paintImageData.data[idx * 4]     = r;
      paintImageData.data[idx * 4 + 1] = g;
      paintImageData.data[idx * 4 + 2] = b;
      paintImageData.data[idx * 4 + 3] = 255;
      compositeCanvas();
    } else if (msg.type === "error") {
      if (msg.code === 402) initSession();
      console.log("[WS] ", msg.code, msg.message);
    }
  };

  ws.onclose = function() {
    wsReady = false; ws = null; setWsStatus(false);
    setTimeout(function() {
      if (document.getElementById("canvas-page").style.display !== "none") connectWS();
    }, 2000);
  };
  ws.onerror = function() {};
}

function setWsStatus(on) {
  document.getElementById("ws-dot").className = on ? "online" : "";
}
function setOnlineCount(n) {
  document.getElementById("online-count").textContent = n > 0 ? n + " online" : "";
  setWsStatus(true);
}

// ═══════════ CANVAS ═══════════
var W = 2560, H = 1600, GRID = 10;
var COLORS = [
  "#FF0000","#FF3333","#FF5555","#FF7777","#CC0000","#AA0000","#880000","#FF9999",
  "#FF8800","#FFAA00","#FFCC00","#FFDD44","#EE7700","#CC6600","#AA5500","#FFE088",
  "#44FF44","#22DD22","#00CC00","#00AA00","#008800","#006600","#88FF88","#CCFFCC",
  "#00FFCC","#00DDAA","#00CCCC","#00AAAA","#008888","#006666","#88FFDD","#88DDCC",
  "#4488FF","#3366DD","#2244CC","#2222AA","#111188","#000066","#88AAFF","#AACCFF",
  "#8844FF","#7722DD","#6600CC","#5500AA","#440088","#330066","#AA88FF","#CCAAFF",
  "#FF44AA","#FF2288","#FF0066","#DD0055","#CC0044","#AA0033","#FF88CC","#FFAADD",
  "#886644","#AA7744","#CC9955","#DAA520","#C8961E","#B8860B","#FFCC88","#FFDDAA",
  "#000000","#333333","#555555","#777777","#999999","#BBBBBB","#DDDDDD","#FFFFFF",
  "#8B4513","#CD853F","#DEB887","#F5DEB3","#D2691E","#A0522D","#BC8F8F","#FFE4C4"
];
var selectedColor = COLORS[0], zoom = 0.4, panX = 0, panY = 0;
var gridImageData = null, paintImageData = null;

function prerenderGrid() {
  gridImageData = document.getElementById("pixel-canvas").getContext("2d").createImageData(W, H);
  var d = gridImageData.data;
  for (var y = 0; y < H; y++)
    for (var x = 0; x < W; x++) {
      var i = (y * W + x) * 4;
      if (x % GRID === 0 || y % GRID === 0) { d[i]=232; d[i+1]=232; d[i+2]=232; d[i+3]=255; }
      else { d[i]=255; d[i+1]=255; d[i+2]=255; d[i+3]=255; }
    }
}

function compositeCanvas() {
  var c = document.getElementById("pixel-canvas");
  var ctx = c.getContext("2d");
  ctx.putImageData(gridImageData, 0, 0);
  if (paintImageData) {
    var off = document.createElement("canvas"); off.width = W; off.height = H;
    off.getContext("2d").putImageData(paintImageData, 0, 0);
    ctx.drawImage(off, 0, 0);
  }
}

function openCanvas() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("canvas-page").style.display = "block";
  buildCanvas();
  buildChat();
  initSession();
}

function closeCanvas() {
  if (ws) { try { ws.close(); } catch(e){}; ws = null; wsReady = false; }
  document.getElementById("canvas-page").style.display = "none";
  document.getElementById("landing").style.display = "flex";
}

function buildCanvas() {
  var c = document.getElementById("pixel-canvas");
  c.width = W; c.height = H;
  var ctx = c.getContext("2d"); ctx.imageSmoothingEnabled = false;
  if (!gridImageData) prerenderGrid();
  if (!paintImageData) {
    paintImageData = ctx.createImageData(W, H);
    for (var i = 3; i < paintImageData.data.length; i += 4) paintImageData.data[i] = 0;
  }
  compositeCanvas();

  // Color swatches
  var g = document.getElementById("color-grid"); g.innerHTML = "";
  COLORS.forEach(function(col, i) {
    var s = document.createElement("div");
    s.className = "color-swatch" + (i === 0 ? " selected" : "");
    s.style.background = col; s.dataset.color = col;
    s.addEventListener("click", function(e) {
      selectedColor = e.currentTarget.dataset.color;
      var aa = document.querySelectorAll(".color-swatch");
      for (var a = 0; a < aa.length; a++) aa[a].classList.remove("selected");
      e.currentTarget.classList.add("selected");
    });
    g.appendChild(s);
  });

  buildPayPalButton();

  var vw = window.innerWidth - 260, vh = window.innerHeight - 200;
  zoom = Math.min(vw / W, vh / H, 0.45);
  applyTransform();

  c.addEventListener("wheel", function(e) {
    e.preventDefault();
    zoom *= e.deltaY > 0 ? 0.92 : 1.08;
    zoom = Math.max(0.06, Math.min(6, zoom));
    applyTransform();
  }, {passive: false});

  var dragging = false, lastX, lastY;
  c.addEventListener("mousedown", function(e) {
    if (e.button === 1 || e.altKey) { dragging = true; lastX = e.clientX; lastY = e.clientY; e.preventDefault(); }
  });
  window.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    panX += (e.clientX - lastX) / zoom; panY += (e.clientY - lastY) / zoom;
    lastX = e.clientX; lastY = e.clientY; applyTransform();
  });
  window.addEventListener("mouseup", function() { dragging = false; });

  // Click → send to WebSocket server
  c.addEventListener("click", function(e) {
    if (dragging) return;
    if (clicksRemaining <= 0) { alert(t("no_clicks")); return; }
    var rect = c.getBoundingClientRect();
    var x = Math.floor((e.clientX - rect.left) / zoom);
    var y = Math.floor((e.clientY - rect.top) / zoom);
    if (x < 0 || x >= W || y < 0 || y >= H) return;

    // Optimistic UI
    clicksRemaining--;
    localStorage.setItem("cm_clicks", clicksRemaining);
    updateClickCount();

    // Paint locally
    var idx = (y * W + x) * 4;
    var rh = parseInt(selectedColor.slice(1,3), 16);
    var gh = parseInt(selectedColor.slice(3,5), 16);
    var bh = parseInt(selectedColor.slice(5,7), 16);
    paintImageData.data[idx] = rh; paintImageData.data[idx+1] = gh;
    paintImageData.data[idx+2] = bh; paintImageData.data[idx+3] = 255;
    compositeCanvas();

    // Send to server via WebSocket
    var clickMsg = { type: "click", x: x, y: y, color: selectedColor };
    if (wsReady) { ws.send(JSON.stringify(clickMsg)); }
    else { wsQueue.push(clickMsg); }
  });

  // Pinch zoom
  var lastDist = 0;
  c.addEventListener("touchstart", function(e) {
    if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  });
  c.addEventListener("touchmove", function(e) {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom *= d / lastDist; zoom = Math.max(0.06, Math.min(6, zoom)); lastDist = d; applyTransform();
  }, {passive: false});
}

function applyTransform() {
  var c = document.getElementById("pixel-canvas");
  c.style.width = (W * zoom) + "px"; c.style.height = (H * zoom) + "px";
  var w = document.getElementById("canvas-wrap");
  w.style.width = (W * zoom) + "px"; w.style.height = (H * zoom) + "px";
  w.style.left = "50%"; w.style.top = "50%";
  w.style.transform = "translate(-50%, -50%)";
  w.style.marginLeft = (panX * zoom) + "px"; w.style.marginTop = (panY * zoom) + "px";
}

function updateClickCount() {
  document.getElementById("click-count").textContent = clicksRemaining;
}

// ═══════════ PAYPAL ═══════════
function buildPayPalButton() {
  var c = document.getElementById("paypal-btn-container"); c.innerHTML = "";
  if (PAYPAL_CLIENT_ID === "CLIENT_ID") {
    c.innerHTML = "<button data-action=\"buy-clicks\" style=\"width:100%;padding:12px;background:#0070ba;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;letter-spacing:.5px\">$1 → 100次点击</button>";
    return;
  }
  if (window.paypal) {
    paypal.Buttons({
      style: { layout: "vertical", color: "blue", shape: "rect", label: "paypal" },
      createOrder: function() {
        document.getElementById("buy-status").textContent = t("paying");
        return fetch(API_BASE + "/api/paypal/create-order", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({session_id: sessionId, amount_cents: 100})
        }).then(function(r) { return r.json(); }).then(function(d) { return d.order_id; });
      },
      onApprove: function(data) {
        return fetch(API_BASE + "/api/paypal/capture-order", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({order_id: data.orderID, session_id: sessionId})
        }).then(function(r) { return r.json(); }).then(function(result) {
          if (result.success) {
            clicksRemaining = result.clicks;
            localStorage.setItem("cm_clicks", clicksRemaining);
            updateClickCount();
            document.getElementById("buy-status").textContent = t("paid");
            setTimeout(function() { document.getElementById("buy-status").textContent = ""; }, 8000);
          }
        });
      },
      onError: function(err) { console.error("PayPal error:", err); }
    }).render("#paypal-btn-container");
  }
}

// ═══════════ PANELS ═══════════
function toggleLeft() {
  var p = document.getElementById("left-panel"); p.classList.toggle("open");
  document.getElementById("left-toggle").textContent = p.classList.contains("open") ? "✕" : "☰";
}
function toggleRight() {
  var p = document.getElementById("right-panel"); p.classList.toggle("open");
  document.getElementById("right-toggle").textContent = p.classList.contains("open") ? "▶" : "◀";
}

// ═══════════ CHAT ═══════════
function buildChat() {
  var stored = JSON.parse(localStorage.getItem("cm_chat") || "[]");
  var b = document.getElementById("chat-msgs"); b.innerHTML = "";
  stored.forEach(function(m) {
    var d = document.createElement("div"); d.className = "chat-msg";
    d.innerHTML = "<span class=\"time\">" + m.time + "</span>" + escHtml(m.text); b.appendChild(d);
  });
  b.scrollTop = b.scrollHeight;
}
function sendChat() {
  var inp = document.getElementById("chat-input"), text = inp.value.trim();
  if (!text) return;
  var now = new Date();
  var time = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
  var msgs = JSON.parse(localStorage.getItem("cm_chat") || "[]");
  msgs.push({text: text, time: time}); if (msgs.length > 200) msgs.shift();
  localStorage.setItem("cm_chat", JSON.stringify(msgs));
  var b = document.getElementById("chat-msgs");
  var d = document.createElement("div"); d.className = "chat-msg";
  d.innerHTML = "<span class=\"time\">" + time + "</span>" + escHtml(text); b.appendChild(d);
  b.scrollTop = b.scrollHeight; inp.value = "";
}
function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ═══════════ EVENT DELEGATION ═══════════
document.addEventListener("click", function(e) {
  var el = e.target.closest("[data-action]"); if (!el) return;
  var a = el.dataset.action;
  if (a === "open-canvas")  openCanvas();
  if (a === "close-canvas") closeCanvas();
  if (a === "toggle-left")  toggleLeft();
  if (a === "toggle-right") toggleRight();
  if (a === "send-chat")    sendChat();
  if (a === "buy-clicks") {
    clicksRemaining += 100;
    localStorage.setItem("cm_clicks", clicksRemaining);
    updateClickCount();
    document.getElementById("buy-status").textContent = t("paid");
    setTimeout(function() { document.getElementById("buy-status").textContent = ""; }, 5000);
  }
}, true);

document.getElementById("langSwitch").addEventListener("click", function(e) {
  var btn = e.target.closest("button[data-lang]"); if (!btn) return; setLang(btn.dataset.lang);
}, true);

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.activeElement === document.getElementById("chat-input")) sendChat();
});

updateClickCount();
</script>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickMatch</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#fff;color:#222;min-height:100vh;overflow-x:hidden}

/* ═══════════ LANDING ═══════════ */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;position:relative}
#landing .title{position:absolute;top:40px;left:48px;font-size:30px;font-weight:700;letter-spacing:2px;color:#111;cursor:default;user-select:none}
#phases{display:flex;gap:64px;align-items:center;justify-content:center;flex-wrap:wrap}
.phase-wrapper{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative}
.phase-circle{width:130px;height:130px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:300;color:#bbb;cursor:default;transition:all .25s;background:#fff;position:relative}
.phase-circle.active{border-color:#333;color:#111;cursor:pointer}
.phase-circle.active:hover{background:#f7f7f7;transform:scale(1.06)}
.phase-circle.locked{background:#fafafa;border-style:dashed;border-color:#e0e0e0}
.phase-circle.locked .lock-icon{font-size:18px;color:#ccc}
.phase-label{font-size:14px;color:#999;text-align:center;letter-spacing:1px}

/* speech bubble over phase 1 */
.phase-bubble{position:absolute;top:-56px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;white-space:nowrap;animation:float 2.5s ease-in-out infinite;pointer-events:none}
.phase-bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #333}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}

/* footer */
#landing footer{position:absolute;bottom:48px;text-align:center;font-size:13px;color:#aaa;line-height:2}

/* language switch */
.lang-switch{position:absolute;bottom:48px;right:48px;display:flex;gap:6px}
.lang-switch button{background:transparent;border:1px solid #e0e0e0;padding:5px 9px;border-radius:4px;cursor:pointer;color:#999;font-size:11px;transition:all .15s}
.lang-switch button:hover{background:#f5f5f5;color:#333}
.lang-switch button.active{background:#222;color:#fff;border-color:#222}

/* ═══════════ CANVAS PAGE ═══════════ */
#canvas-page{display:none;width:100vw;height:100vh;position:relative;background:#fff;overflow:hidden}
#back-btn{position:absolute;top:20px;left:24px;z-index:100;background:transparent;border:1px solid #ddd;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px;color:#666;transition:all .15s}
#back-btn:hover{background:#f5f5f5;color:#111}

/* canvas with breathing room */
#canvas-wrap{position:absolute;overflow:hidden;border:1px solid #eee}
#pixel-canvas{display:block;image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;cursor:crosshair}

/* left & right toggle buttons */
#left-toggle,#right-toggle{position:absolute;top:50%;transform:translateY(-50%);z-index:100;background:#fff;border:1px solid #e0e0e0;width:30px;height:64px;cursor:pointer;font-size:16px;color:#999;display:flex;align-items:center;justify-content:center;transition:all .15s}
#left-toggle{left:0;border-left:none;border-radius:0 5px 5px 0}
#right-toggle{right:0;border-right:none;border-radius:5px 0 0 5px}
#left-toggle:hover,#right-toggle:hover{background:#f5f5f5;color:#333}

/* left panel: color picker + buy clicks */
#left-panel{position:absolute;left:0;top:0;width:280px;height:100vh;background:#fafafa;border-right:1px solid #eee;z-index:99;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;padding:80px 16px 24px;overflow-y:auto}
#left-panel.open{transform:translateX(0)}
#left-panel h3{font-size:13px;font-weight:500;color:#999;margin-bottom:14px;text-transform:uppercase;letter-spacing:2px}
#color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:28px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:3px;border:1px solid #ddd;cursor:pointer;transition:transform .12s}
.color-swatch:hover{transform:scale(1.25);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.color-swatch.selected{border:2px solid #333;box-shadow:0 0 0 1px #fff,0 0 0 3px #333}
#buy-clicks{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;letter-spacing:.5px;transition:background .15s}
#buy-clicks:hover{background:#333}
#clicks-remain{text-align:center;font-size:12px;color:#bbb;margin-top:10px}

/* right panel: anonymous chat */
#right-panel{position:absolute;right:0;top:0;width:280px;height:100vh;background:#fafafa;border-left:1px solid #eee;z-index:99;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;padding:80px 16px 20px}
#right-panel.open{transform:translateX(0)}
#right-panel h3{font-size:13px;font-weight:500;color:#999;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px}
#chat-msgs{flex:1;overflow-y:auto;font-size:13px;line-height:1.7;margin-bottom:12px}
.chat-msg{padding:6px 0;border-bottom:1px solid #f5f5f5;word-break:break-word}
.chat-msg .time{font-size:10px;color:#ccc;margin-right:8px}
.chat-area{display:flex;gap:6px}
#chat-input{flex:1;padding:9px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
#chat-input:focus{border-color:#aaa}
#chat-send{padding:9px 16px;background:#111;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;letter-spacing:.5px;transition:background .15s}
#chat-send:hover{background:#333}

@media(max-width:768px){
  #landing .title{position:static;text-align:center;margin-bottom:48px;font-size:24px}
  #phases{gap:28px}
  .phase-circle{width:90px;height:90px;font-size:32px}
  .phase-bubble{font-size:11px;padding:6px 12px}
  .lang-switch{bottom:24px;right:24px}
}
</style>
</head>
<body>

<!-- ═══════════ LANDING ═══════════ -->
<div id="landing">
  <div class="title">ClickMatch</div>

  <div id="phases">
    <div class="phase-wrapper">
      <div class="phase-circle active" data-action="open-canvas">

        <div class="phase-bubble" data-i18n="phase1_live">第一阶段火热进行中</div>

</div>

<!-- ═══════════ CANVAS PAGE ═══════════ -->
<div id="canvas-page">
  <button id="back-btn" data-action="close-canvas">← <span data-i18n="back">返回</span></button>

  <button id="left-toggle" data-action="toggle-left">☰</button>
  <button id="right-toggle" data-action="toggle-right">◀</button>

  <div id="canvas-wrap">
    <canvas id="pixel-canvas"></canvas>
  </div>

  <div id="left-panel">
    <h3 data-i18n="colors">颜色</h3>
    <div id="color-grid"></div>
    <button id="buy-clicks" data-action="buy-clicks" data-i18n="buy_clicks">$1 → 100次点击</button>
    <div id="clicks-remain"><span data-i18n="remaining">剩余</span>: <span id="click-count">0</span></div>
  </div>

  <div id="right-panel">
    <h3 data-i18n="live_chat">实时聊天</h3>
    <div id="chat-msgs"></div>
    <div class="chat-area">
      <input id="chat-input" placeholder="说点什么..." data-i18n-placeholder="chat_placeholder">
      <button id="chat-send" data-action="send-chat" data-i18n="send">发送</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ═══════════ i18n ═══════════
var I18N = {
  zh:{phase1_live:"第一阶段火热进行中",phase1:"第一阶段",phase2:"第二阶段",phase3:"第三阶段",phase4:"第四阶段",phase1_dates:"第一阶段由2026.7.10开始，截止到2026.7.23",more_phases:"后续阶段尽情期待",back:"返回",colors:"颜色",buy_clicks:"$1 → 100次点击",remaining:"剩余",live_chat:"实时聊天",chat_placeholder:"说点什么...",send:"发送",no_clicks:"没有剩余点击次数"},
  en:{phase1_live:"Phase 1 Now Live",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: July 10 – July 23, 2026",more_phases:"More phases coming soon",back:"Back",colors:"Colors",buy_clicks:"$1 → 100 Clicks",remaining:"Remaining",live_chat:"Live Chat",chat_placeholder:"Say something...",send:"Send",no_clicks:"No clicks remaining"},
  ja:{phase1_live:"フェーズ1 開催中",phase1:"フェーズ1",phase2:"フェーズ2",phase3:"フェーズ3",phase4:"フェーズ4",phase1_dates:"フェーズ1: 2026.7.10 – 7.23",more_phases:"続くフェーズをお楽しみに",back:"戻る",colors:"色",buy_clicks:"$1 → 100クリック",remaining:"残り",live_chat:"ライブチャット",chat_placeholder:"何か話す...",send:"送信",no_clicks:"クリック残数なし"},
  ko:{phase1_live:"1단계 진행 중",phase1:"1단계",phase2:"2단계",phase3:"3단계",phase4:"4단계",phase1_dates:"1단계: 2026.7.10 – 7.23",more_phases:"다음 단계를 기대해주세요",back:"뒤로",colors:"색상",buy_clicks:"$1 → 100클릭",remaining:"남음",live_chat:"실시간 채팅",chat_placeholder:"이야기하기...",send:"전송",no_clicks:"클릭 횟수 없음"},
  fr:{phase1_live:"Phase 1 en cours",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: 10 – 23 juillet 2026",more_phases:"Prochaines phases à venir",back:"Retour",colors:"Couleurs",buy_clicks:"$1 → 100 clics",remaining:"Restant",live_chat:"Chat en direct",chat_placeholder:"Dites quelque chose...",send:"Envoyer",no_clicks:"Plus de clics"},
  de:{phase1_live:"Phase 1 läuft",phase1:"Phase 1",phase2:"Phase 2",phase3:"Phase 3",phase4:"Phase 4",phase1_dates:"Phase 1: 10. Juli – 23. Juli 2026",more_phases:"Weitere Phasen folgen",back:"Zurück",colors:"Farben",buy_clicks:"$1 → 100 Klicks",remaining:"Verbleibend",live_chat:"Live-Chat",chat_placeholder:"Sag etwas...",send:"Senden",no_clicks:"Keine Klicks übrig"},
  es:{phase1_live:"Fase 1 en curso",phase1:"Fase 1",phase2:"Fase 2",phase3:"Fase 3",phase4:"Fase 4",phase1_dates:"Fase 1: 10 – 23 julio 2026",more_phases:"Próximas fases pronto",back:"Volver",colors:"Colores",buy_clicks:"$1 → 100 clics",remaining:"Restante",live_chat:"Chat en vivo",chat_placeholder:"Di algo...",send:"Enviar",no_clicks:"Sin clics restantes"},
  ar:{phase1_live:"المرحلة الأولى جارية",phase1:"المرحلة ١",phase2:"المرحلة ٢",phase3:"المرحلة ٣",phase4:"المرحلة ٤",phase1_dates:"المرحلة الأولى: ١٠-٢٣ يوليو ٢٠٢٦",more_phases:"المزيد من المراحل قريباً",back:"رجوع",colors:"الألوان",buy_clicks:"$1 → 100 نقرة",remaining:"متبقي",live_chat:"دردشة مباشرة",chat_placeholder:"قل شيئاً...",send:"إرسال",no_clicks:"لا توجد نقرات متبقية"},
  ru:{phase1_live:"Фаза 1 идёт",phase1:"Фаза 1",phase2:"Фаза 2",phase3:"Фаза 3",phase4:"Фаза 4",phase1_dates:"Фаза 1: 10–23 июля 2026",more_phases:"Следующие фазы скоро",back:"Назад",colors:"Цвета",buy_clicks:"$1 → 100 кликов",remaining:"Осталось",live_chat:"Чат",chat_placeholder:"Скажите что-нибудь...",send:"Отправить",no_clicks:"Клики закончились"}
};

var lang = "zh";

function t(key) {
  return (I18N[lang] && I18N[lang][key]) || (I18N.zh && I18N.zh[key]) || key;
}

function setLang(l) {
  lang = l;
  var btns = document.querySelectorAll(".lang-switch button");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i].dataset.lang === l);
  }
  var els = document.querySelectorAll("[data-i18n]");
  for (var j = 0; j < els.length; j++) {
    els[j].textContent = t(els[j].dataset.i18n);
  }
  var phs = document.querySelectorAll("[data-i18n-placeholder]");
  for (var k = 0; k < phs.length; k++) {
    phs[k].placeholder = t(phs[k].dataset.i18nPlaceholder);
  }
}

// ═══════════ CANVAS ENGINE ═══════════
var W = 1920, H = 1440;
var GRID_SIZE = 10; // grid line every 10px
var COLORS = [
  // Reds (8)
  "#FF0000","#FF3333","#FF5555","#FF7777","#CC0000","#AA0000","#880000","#FF9999",
  // Oranges / Yellows (8)
  "#FF8800","#FFAA00","#FFCC00","#FFDD44","#EE7700","#CC6600","#AA5500","#FFE088",
  // Greens (8)
  "#44FF44","#22DD22","#00CC00","#00AA00","#008800","#006600","#88FF88","#CCFFCC",
  // Teals / Cyans (8)
  "#00FFCC","#00DDAA","#00CCCC","#00AAAA","#008888","#006666","#88FFDD","#88DDCC",
  // Blues (8)
  "#4488FF","#3366DD","#2244CC","#2222AA","#111188","#000066","#88AAFF","#AACCFF",
  // Purples / Magentas (8)
  "#8844FF","#7722DD","#6600CC","#5500AA","#440088","#330066","#AA88FF","#CCAAFF",
  // Pinks (8)
  "#FF44AA","#FF2288","#FF0066","#DD0055","#CC0044","#AA0033","#FF88CC","#FFAADD",
  // Browns / Golds (8)
  "#886644","#AA7744","#CC9955","#DAA520","#C8961E","#B8860B","#FFCC88","#FFDDAA",
  // Neutrals (8)
  "#000000","#333333","#555555","#777777","#999999","#BBBBBB","#DDDDDD","#FFFFFF",
  // Earth / Warm (8)
  "#8B4513","#CD853F","#DEB887","#F5DEB3","#D2691E","#A0522D","#BC8F8F","#FFE4C4"
];
var selectedColor = COLORS[0];
var zoom = 0.4, panX = 0, panY = 0;
var clicksRemaining = parseInt(localStorage.getItem("cm_clicks") || "0", 10);
var gridImageData = null;  // pre-rendered grid layer
var paintImageData = null; // user-placed pixels layer

/* Pre-render the 1920x1440 grid as an ImageData buffer */
function prerenderGrid() {
  gridImageData = document.getElementById("pixel-canvas").getContext("2d").createImageData(W, H);
  var d = gridImageData.data;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var i = (y * W + x) * 4;
      if (x % GRID_SIZE === 0 || y % GRID_SIZE === 0) {
        d[i]=232; d[i+1]=232; d[i+2]=232; d[i+3]=255;
      } else {
        d[i]=255; d[i+1]=255; d[i+2]=255; d[i+3]=255;
      }
    }
  }
}

/* Composite grid + user pixels onto canvas */
function compositeCanvas() {
  var c = document.getElementById("pixel-canvas");
  var ctx = c.getContext("2d");
  // Start with grid
  ctx.putImageData(gridImageData, 0, 0);
  // Overlay user pixels (if any)
  if (paintImageData) {
    var src = paintImageData.data;
    var dstCtx = c.getContext("2d");
    // For performance, use drawImage from an offscreen canvas
    var off = document.createElement("canvas");
    off.width = W; off.height = H;
    var offCtx = off.getContext("2d");
    offCtx.putImageData(paintImageData, 0, 0);
    ctx.drawImage(off, 0, 0);
  }
}

function openCanvas() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("canvas-page").style.display = "block";
  buildCanvas();
  buildChat();
  updateClickCount();
}

function closeCanvas() {
  document.getElementById("canvas-page").style.display = "none";
  document.getElementById("landing").style.display = "flex";
}

function buildCanvas() {
  var c = document.getElementById("pixel-canvas");
  c.width = W;
  c.height = H;
  var ctx = c.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  // Pre-render grid once
  if (!gridImageData) prerenderGrid();

  // Init paint layer from localStorage
  if (!paintImageData) {
    var saved = localStorage.getItem("cm_pixels");
    if (saved) {
      paintImageData = ctx.createImageData(W, H);
      var arr = JSON.parse(saved);
      var pd = paintImageData.data;
      for (var idx in arr) {
        var color = arr[idx];
        var pi = parseInt(idx, 10) * 4;
        pd[pi] = (color >> 16) & 0xFF;
        pd[pi+1] = (color >> 8) & 0xFF;
        pd[pi+2] = color & 0xFF;
        pd[pi+3] = 255;
      }
    } else {
      paintImageData = ctx.createImageData(W, H);
      for (var i = 0; i < paintImageData.data.length; i += 4) {
        paintImageData.data[i+3] = 0; // transparent initially
      }
    }
  }

  compositeCanvas();

  // Color swatches
  var grid = document.getElementById("color-grid");
  grid.innerHTML = "";
  COLORS.forEach(function(col, i) {
    var sw = document.createElement("div");
    sw.className = "color-swatch" + (i === 0 ? " selected" : "");
    sw.style.background = col;
    sw.dataset.color = col;
    sw.addEventListener("click", function(e) {
      selectedColor = e.currentTarget.dataset.color;
      var all = document.querySelectorAll(".color-swatch");
      for (var a = 0; a < all.length; a++) all[a].classList.remove("selected");
      e.currentTarget.classList.add("selected");
    });
    grid.appendChild(sw);
  });

  // Fit with breathing room
  var vw = window.innerWidth - 260;
  var vh = window.innerHeight - 200;
  zoom = Math.min(vw / W, vh / H, 0.45);
  applyTransform();

  // Wheel zoom
  c.addEventListener("wheel", function(e) {
    e.preventDefault();
    zoom *= e.deltaY > 0 ? 0.92 : 1.08;
    zoom = Math.max(0.06, Math.min(6, zoom));
    applyTransform();
  }, {passive: false});

  // Pan with middle-click or alt+drag
  var dragging = false, lastX, lastY;
  c.addEventListener("mousedown", function(e) {
    if (e.button === 1 || e.altKey) {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      e.preventDefault();
    }
  });
  window.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    panX += (e.clientX - lastX) / zoom;
    panY += (e.clientY - lastY) / zoom;
    lastX = e.clientX;
    lastY = e.clientY;
    applyTransform();
  });
  window.addEventListener("mouseup", function() { dragging = false; });

  // Place pixel
  c.addEventListener("click", function(e) {
    if (dragging) return;
    if (clicksRemaining <= 0) { alert(t("no_clicks")); return; }
    var rect = c.getBoundingClientRect();
    var x = Math.floor((e.clientX - rect.left) / zoom);
    var y = Math.floor((e.clientY - rect.top) / zoom);
    if (x < 0 || x >= W || y < 0 || y >= H) return;

    // Store in paint layer
    var idx = (y * W + x) * 4;
    var rgb = (function(h) {
      return {
        r: parseInt(h.slice(1,3), 16),
        g: parseInt(h.slice(3,5), 16),
        b: parseInt(h.slice(5,7), 16)
      };
    })(selectedColor);
    paintImageData.data[idx]     = rgb.r;
    paintImageData.data[idx + 1] = rgb.g;
    paintImageData.data[idx + 2] = rgb.b;
    paintImageData.data[idx + 3] = 255;

    // Persist to localStorage
    var savedPixels = JSON.parse(localStorage.getItem("cm_pixels") || "{}");
    var pxIdx = y * W + x;
    var colorVal = (rgb.r << 16) | (rgb.g << 8) | rgb.b;
    savedPixels[pxIdx] = colorVal;
    localStorage.setItem("cm_pixels", JSON.stringify(savedPixels));

    // Re-render composite
    compositeCanvas();

    clicksRemaining--;
    localStorage.setItem("cm_clicks", clicksRemaining);
    updateClickCount();
  });

  // Pinch zoom (mobile)
  var lastDist = 0;
  c.addEventListener("touchstart", function(e) {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });
  c.addEventListener("touchmove", function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      var dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoom *= dist / lastDist;
      zoom = Math.max(0.06, Math.min(6, zoom));
      lastDist = dist;
      applyTransform();
    }
  }, {passive: false});
}

function applyTransform() {
  var c = document.getElementById("pixel-canvas");
  c.style.width  = (W * zoom) + "px";
  c.style.height = (H * zoom) + "px";
  var wrap = document.getElementById("canvas-wrap");
  wrap.style.width  = (W * zoom) + "px";
  wrap.style.height = (H * zoom) + "px";
  wrap.style.left   = "50%";
  wrap.style.top    = "50%";
  wrap.style.transform = "translate(-50%, -50%)";
  wrap.style.marginLeft = (panX * zoom) + "px";
  wrap.style.marginTop  = (panY * zoom) + "px";
}

function updateClickCount() {
  document.getElementById("click-count").textContent = clicksRemaining;
}

function buyClicks() {
  clicksRemaining += 100;
  localStorage.setItem("cm_clicks", clicksRemaining);
  updateClickCount();
}

// ═══════════ PANELS ═══════════
function toggleLeft() {
  var p = document.getElementById("left-panel");
  p.classList.toggle("open");
  document.getElementById("left-toggle").textContent = p.classList.contains("open") ? "✕" : "☰";
}

function toggleRight() {
  var p = document.getElementById("right-panel");
  p.classList.toggle("open");
  document.getElementById("right-toggle").textContent = p.classList.contains("open") ? "▶" : "◀";
}

// ═══════════ CHAT ═══════════
function buildChat() {
  var stored = JSON.parse(localStorage.getItem("cm_chat") || "[]");
  var box = document.getElementById("chat-msgs");
  box.innerHTML = "";
  stored.forEach(function(m) {
    var d = document.createElement("div");
    d.className = "chat-msg";
    d.innerHTML = "<span class=\"time\">" + m.time + "</span>" + escHtml(m.text);
    box.appendChild(d);
  });
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  var inp = document.getElementById("chat-input");
  var text = inp.value.trim();
  if (!text) return;
  var now = new Date();
  var time = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  var msgs = JSON.parse(localStorage.getItem("cm_chat") || "[]");
  msgs.push({text: text, time: time});
  if (msgs.length > 200) msgs.shift();
  localStorage.setItem("cm_chat", JSON.stringify(msgs));
  var box = document.getElementById("chat-msgs");
  var d = document.createElement("div");
  d.className = "chat-msg";
  d.innerHTML = "<span class=\"time\">" + time + "</span>" + escHtml(text);
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  inp.value = "";
}

function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════ EVENT DELEGATION (NO onclick!!) ═══════════
document.addEventListener("click", function(e) {
  var el = e.target.closest("[data-action]");
  if (!el) return;
  var action = el.dataset.action;
  if (action === "open-canvas")     openCanvas();
  if (action === "close-canvas")    closeCanvas();
  if (action === "toggle-left")     toggleLeft();
  if (action === "toggle-right")    toggleRight();
  if (action === "buy-clicks")      buyClicks();
  if (action === "send-chat")       sendChat();
}, true);

// language buttons
document.getElementById("langSwitch").addEventListener("click", function(e) {
  var btn = e.target.closest("button[data-lang]");
  if (!btn) return;
  setLang(btn.dataset.lang);
}, true);

// Enter to send chat
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.activeElement === document.getElementById("chat-input")) {
    sendChat();
  }
});

updateClickCount();
</script>
</body>
